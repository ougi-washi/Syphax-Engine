name: linux-build-test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Debug
  ANDROID_API_LEVEL: "34"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK_VERSION: "29.0.14206865"
  BUNDLETOOL_VERSION: "1.18.2"

jobs:
  linux-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config
          sudo apt-get install -y libwayland-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxkbcommon-dev
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev
          sudo apt-get install -y libpulse-dev libasound-dev libsndio-dev libjack-jackd2-dev

      - name: Build
        run: ./build.sh

      - name: Validate expected test binaries exist
        run: |
          test -x ./bin/context_lifecycle
          test -x ./bin/gltf_roundtrip
          test -x ./bin/rts_integration

      - name: Check example line budget
        run: ./scripts/check_example_line_budget.sh

      - name: Test (context lifecycle teardown regression)
        run: |
          timeout 25s env \
            SE_TERMINAL_RENDER=1 \
            SE_TERMINAL_HIDE_WINDOW=1 \
            ./bin/context_lifecycle

      - name: Test (GLTF GLB roundtrip)
        run: |
          timeout 15s ./bin/gltf_roundtrip

      - name: Test (rts_integration terminal autotest)
        run: |
          timeout 25s env \
            SE_TERMINAL_RENDER=1 \
            SE_TERMINAL_HIDE_WINDOW=1 \
            ./bin/rts_integration --autotest --seconds=2 --autotest-steps=20 --autotest-dt=0.05

      - name: Build (terminal platform rts_integration)
        run: ./build.sh -platform=terminal rts_integration

      - name: Test (rts_integration terminal platform autotest)
        run: |
          timeout 25s ./bin/rts_integration --autotest --seconds=2 --autotest-steps=20 --autotest-dt=0.05

  android-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config ninja-build zip unzip curl

      - name: Install Android SDK packages
        run: |
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          export ANDROID_SDK_ROOT
          test -n "${ANDROID_SDK_ROOT}"

          set +e +o pipefail
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null
          sdkmanager_status=$?
          set -e -o pipefail
          if [[ "$sdkmanager_status" -ne 0 && "$sdkmanager_status" -ne 141 ]]; then
            exit "$sdkmanager_status"
          fi

          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --install \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Download bundletool
        run: |
          mkdir -p "$HOME/.local/share/android-tools/bundletool"
          curl -fsSL \
            -o "$HOME/.local/share/android-tools/bundletool/bundletool-all-${BUNDLETOOL_VERSION}.jar" \
            "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar"

      - name: Build Android APK and AAB
        run: |
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          export ANDROID_SDK_ROOT
          test -n "${ANDROID_SDK_ROOT}"

          bash scripts/android/build_native_activity.sh \
            --mode=both \
            --all-examples \
            --api="${ANDROID_API_LEVEL}" \
            --build-type=Release \
            --sdk-root="${ANDROID_SDK_ROOT}" \
            --ndk-root="${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"

      - name: Validate Android artifacts exist
        run: |
          test -f "./bin/android/arm64-v8a/libsyphax_android_app.so"
          test -f "./bin/android/arm64-v8a/examples/libsyphax_android_example_model_viewer.so"
          test -f "./bin/android/arm64-v8a/examples/libsyphax_android_example_rts_integration.so"
          test -f "./build/android/arm64-v8a/package/syphax_android_app-arm64-v8a.apk"
          test -f "./build/android/arm64-v8a/package/syphax_android_app-arm64-v8a.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-native-and-packages
          path: |
            ./bin/android/arm64-v8a/libsyphax_android_app.so
            ./bin/android/arm64-v8a/examples/
            ./build/android/arm64-v8a/package/syphax_android_app-arm64-v8a.apk
            ./build/android/arm64-v8a/package/syphax_android_app-arm64-v8a.aab
